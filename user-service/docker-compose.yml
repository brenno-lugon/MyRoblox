services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: myroblox-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: mypassword
      APP_USER: myroblox
      APP_USER_PASSWORD: myroblox123
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data: