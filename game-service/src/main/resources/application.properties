spring.application.name=game-service
server.port=8083
spring.datasource.url=jdbc:postgresql://localhost:5433/myroblox_game
spring.datasource.username=myroblox_game
spring.datasource.password=myroblox123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
myroblox.user-service.url=http://localhost:8082
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.user-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.user-service.permitted-number-of-calls-in-half-open-state=2